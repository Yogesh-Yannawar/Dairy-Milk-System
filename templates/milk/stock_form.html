{% extends 'base.html' %}
{% block title %}Update Stock{% endblock %}
{% block page_title %}Update Stock{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;">
  <div class="card-header"><h3>{{ item.name }} — Update Stock</h3></div>
  <div class="card-body">
    <div style="background:var(--primary-pale);padding:12px 16px;border-radius:8px;margin-bottom:20px;">
      <strong>Current Stock:</strong> {{ item.current_stock }} {{ item.unit }}
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Type</label>
        <select name="transaction_type" class="form-control">
          <option value="in">Stock In</option>
          <option value="out">Stock Out</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Quantity *</label><input type="number" step="0.01" name="quantity" class="form-control" required></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update</button>
      <a href="{% url 'inventory_list' %}" class="btn btn-outline" style="margin-left:8px;">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
