{% extends 'base.html' %}
{% block title %}Add Inventory Item{% endblock %}
{% block page_title %}Add Inventory Item{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;">
  <div class="card-header"><h3>Add Item</h3></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group"><label class="form-label">Item Name *</label><input name="name" class="form-control" required></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Category</label><input name="category" class="form-control" placeholder="e.g. Packaging"></div>
        <div class="form-group"><label class="form-label">Unit</label><input name="unit" class="form-control" placeholder="e.g. kg, litre, pcs"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Min Stock Alert</label><input type="number" name="min_stock" class="form-control" value="0"></div>
        <div class="form-group"><label class="form-label">Price per Unit</label><input type="number" step="0.01" name="price_per_unit" class="form-control" value="0"></div>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Item</button>
      <a href="{% url 'inventory_list' %}" class="btn btn-outline" style="margin-left:8px;">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
