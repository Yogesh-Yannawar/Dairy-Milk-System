{% extends 'base.html' %}
{% block title %}Add Customer{% endblock %}
{% block page_title %}Add Customer{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;">
  <div class="card-header"><h3>Add New Customer</h3></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group"><label class="form-label">Name *</label><input name="name" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Phone *</label><input name="phone" class="form-control" required></div>
      </div>
      <div class="form-group"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Milk per Day (L)</label><input type="number" step="0.5" name="milk_per_day" class="form-control" value="1"></div>
        <div class="form-group"><label class="form-label">Rate per Litre (&#8377;)</label><input type="number" step="0.5" name="rate_per_liter" class="form-control" value="50"></div>
      </div>
      <div class="form-group"><label class="form-label">Joining Date *</label><input type="date" name="joining_date" class="form-control" value="{{ today }}" required></div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Customer</button>
      <a href="{% url 'customer_list' %}" class="btn btn-outline" style="margin-left:8px;">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
