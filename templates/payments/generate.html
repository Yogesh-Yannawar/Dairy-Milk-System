{% extends 'base.html' %}
{% block title %}Generate Bill{% endblock %}
{% block page_title %}Generate Farmer Bill{% endblock %}
{% block content %}
<div class="page-header">
    <div><h2>Generate Bill</h2><p>Create a payment bill for a farmer</p></div>
    <a href="{% url 'payment_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:500px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Farmer *</label>
        <select name="farmer" class="form-control" required>
          <option value="">— Select Farmer —</option>
          {% for f in farmers %}<option value="{{ f.pk }}">{{ f.name }} ({{ f.farmer_id }})</option>{% endfor %}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">From Date *</label>
          <input type="date" name="from_date" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">To Date *</label>
          <input type="date" name="to_date" class="form-control" value="{{ today }}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Period Type</label>
        <select name="period_type" class="form-control">
          <option value="monthly">Monthly</option>
          <option value="weekly">Weekly</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-file-invoice"></i> Generate Bill</button>
    </form>
  </div>
</div>
{% endblock %}
