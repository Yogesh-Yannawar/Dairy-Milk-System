{% extends 'base.html' %}
{% block title %}{{ title }} — DairyPro{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header">
    <div><h2>{{ title }}</h2></div>
    <a href="{% url 'farmer_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:700px;">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% if not farmer %}
      <div class="form-group">
        <label class="form-label">Farmer ID *</label>
        <input name="farmer_id" class="form-control" placeholder="e.g. F001" required>
      </div>
      {% endif %}
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input name="name" class="form-control" value="{% if farmer %}{{ farmer.name }}{% endif %}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone *</label>
          <input name="phone" class="form-control" value="{% if farmer %}{{ farmer.phone }}{% endif %}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address *</label>
        <textarea name="address" class="form-control" rows="2" required>{% if farmer %}{{ farmer.address }}{% endif %}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-control" value="{% if farmer %}{{ farmer.email }}{% endif %}">
        </div>
        <div class="form-group">
          <label class="form-label">Joining Date *</label>
          <input name="joining_date" type="date" class="form-control" value="{% if farmer %}{{ farmer.joining_date|date:'Y-m-d' }}{% endif %}" required>
        </div>
      </div>
      <div style="background:var(--primary-pale);padding:16px;border-radius:10px;margin-bottom:16px;">
        <div style="font-weight:600;margin-bottom:12px;color:var(--primary)"><i class="fas fa-university"></i> Bank Details</div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Bank Name</label><input name="bank_name" class="form-control" value="{% if farmer %}{{ farmer.bank_name }}{% endif %}"></div>
          <div class="form-group"><label class="form-label">Account Number</label><input name="account_number" class="form-control" value="{% if farmer %}{{ farmer.account_number }}{% endif %}"></div>
          <div class="form-group"><label class="form-label">IFSC Code</label><input name="ifsc_code" class="form-control" value="{% if farmer %}{{ farmer.ifsc_code }}{% endif %}"></div>
        </div>
      </div>
      {% if farmer %}
      <div class="form-group">
        <label class="form-label">Status</label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" name="is_active" {% if farmer.is_active %}checked{% endif %} style="width:16px;height:16px;">
          Active Farmer
        </label>
      </div>
      {% endif %}
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Farmer</button>
    </form>
  </div>
</div>
{% endblock %}
