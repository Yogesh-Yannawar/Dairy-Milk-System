{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;">
  <div class="card-header"><h3>Change Password</h3></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group"><label class="form-label">Current Password</label><input type="password" name="old_password" class="form-control" required></div>
      <div class="form-group"><label class="form-label">New Password</label><input type="password" name="new_password" class="form-control" required></div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-lock"></i> Update Password</button>
      <a href="{% url 'profile' %}" class="btn btn-outline" style="margin-left:8px;">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
